<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4" th:fragment="bodyHeader">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Boopoom</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/new}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/trades/new}">거래 제보</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/trades}">거래 조회</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/users}">유저 목록</a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-2" sec:authorize="isAuthenticated()">
                <span class="text-muted small" sec:authentication="name">user@example.com</span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">로그아웃</button>
                </form>
            </div>

            <div class="d-flex gap-2" sec:authorize="isAnonymous()">
                <a class="btn btn-primary btn-sm" th:href="@{/login}">로그인</a>
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/users/new}">회원가입</a>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
