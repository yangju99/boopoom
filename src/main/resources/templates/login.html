<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('로그인')}"></head>
<body>
<div th:replace="~{fragments/bodyHeader :: bodyHeader}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4 text-center">Boopoom 로그인</h1>

                    <div th:if="${loginError}" class="alert alert-danger" role="alert">
                        이메일 또는 비밀번호를 확인해주세요.
                    </div>
                    <div th:if="${logoutSuccess}" class="alert alert-success" role="alert">
                        로그아웃되었습니다.
                    </div>

                    <form method="post" th:action="@{/login}">
                        <div class="mb-3">
                            <label class="form-label" for="username">이메일</label>
                            <input class="form-control" id="username" name="username" type="email" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="password">비밀번호</label>
                            <input class="form-control" id="password" name="password" type="password" required>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">로그인</button>
                    </form>

                    <div class="text-center mt-3">
                        <a class="btn btn-outline-secondary w-100" th:href="@{/users/new}">회원가입</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
