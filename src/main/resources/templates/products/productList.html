<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: header('상품 목록')}"></head>
<body>
<div th:replace="~{fragments/bodyHeader :: bodyHeader}"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">상품 목록</h1>
        <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/}">홈</a>
            <a class="btn btn-dark btn-sm" th:href="@{/products/new}">상품 등록</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th><th>카테고리</th><th>모델명</th><th>브랜드</th><th>세대</th><th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}">1</td>
                    <td th:text="${p.categoryDisplay}">GPU</td>
                    <td th:text="${p.modelName}">RTX</td>
                    <td th:text="${p.brand}">NVIDIA</td>
                    <td th:text="${p.generation}">40</td>
                    <td class="text-end">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/products/{id}(id=${p.id})}">상세</a>
                        <a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-dark btn-sm" th:href="@{/products/{id}/edit(id=${p.id})}">수정</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
