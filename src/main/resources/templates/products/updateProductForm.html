<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('상품 수정')}"></head>
<body>
<div th:replace="~{fragments/bodyHeader :: bodyHeader}"></div>
<main class="container py-4">
    <div class="card shadow-sm"><div class="card-body p-4">
        <h1 class="h4 mb-3">상품 공통 정보 수정</h1>
        <form th:action="@{/products/{id}/edit(id=${productId})}" method="post" th:object="${form}">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">모델명</label><input class="form-control" th:field="*{modelName}" required></div>
                <div class="col-md-6"><label class="form-label">모델번호</label><input class="form-control" th:field="*{modelNumber}" required></div>
                <div class="col-md-4"><label class="form-label">출시연도</label><input class="form-control" type="number" th:field="*{releaseYear}" required></div>
                <div class="col-md-4"><label class="form-label">브랜드</label><input class="form-control" th:field="*{brand}" required></div>
                <div class="col-md-4"><label class="form-label">세대</label><input class="form-control" th:field="*{generation}" required></div>
            </div>
            <button class="btn btn-dark mt-3" type="submit">수정 저장</button>
        </form>
    </div></div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
