<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('거래 제보')}"></head>
<body>
<div th:replace="~{fragments/bodyHeader :: bodyHeader}"></div>
<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h4 mb-3">거래 제보</h1>
            <form th:action="@{/trades/new}" method="post">
                <div class="mb-3">
                    <label class="form-label">거래 상품 선택</label>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-outline-primary product-chip" th:each="p : ${products}"
                                th:attr="data-product-id=${p.id}" th:text="|${p.modelName} (${p.categoryDisplay})|">상품</button>
                    </div>
                    <input id="selectedProductId" type="hidden" name="productId" required>
                    <div class="form-text">상품 버튼을 클릭해 선택하세요.</div>
                </div>

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">가격</label>
                        <input class="form-control" type="number" name="price" min="1" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">지역</label>
                        <input class="form-control" type="text" name="location" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">플랫폼</label>
                        <select class="form-select" name="platform" required>
                            <option th:each="p : ${T(com.example.boopoom.domain.Platform).values()}" th:value="${p}" th:text="${p}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">파손 여부</label>
                        <select class="form-select" name="damageStatus" required>
                            <option th:each="d : ${T(com.example.boopoom.domain.DamageStatus).values()}" th:value="${d}" th:text="${d}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">거래 날짜</label>
                        <input class="form-control" type="date" name="tradeDate" required>
                    </div>
                </div>

                <button class="btn btn-primary mt-3" type="submit">제보 등록</button>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
