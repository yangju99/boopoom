<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: header('거래 목록')}"></head>
<body>
<div th:replace="~{fragments/bodyHeader :: bodyHeader}"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">거래 목록</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" sec:authorize="hasRole('USER')" th:href="@{/trades}">조건 다시 선택</a>
            <a class="btn btn-outline-secondary btn-sm" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/trades}">조건 다시 선택</a>
            <a class="btn btn-outline-primary btn-sm" sec:authorize="hasRole('USER')" th:href="@{/trades/new}">거래 제보</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th><th>상품</th><th>카테고리</th><th>가격</th><th>플랫폼</th><th>상태</th><th>거래일</th><th sec:authorize="hasRole('ADMIN')"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${trades}">
                    <td th:text="${t.id}">1</td>
                    <td th:text="${t.product.modelName}">RTX</td>
                    <td th:text="${t.product.categoryDisplay}">GPU</td>
                    <td th:text="${t.price}">1000</td>
                    <td th:text="${t.platform}">STEAM</td>
                    <td th:text="${t.status}">PENDING</td>
                    <td th:text="${#temporals.format(t.tradeDate, 'yyyy-MM-dd')}">2026-01-01</td>
                    <td sec:authorize="hasRole('ADMIN')" class="text-end">
                        <form th:action="@{/trades/{id}/cancel(id=${t.id})}" method="post">
                            <button class="btn btn-outline-danger btn-sm" type="submit">취소</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
