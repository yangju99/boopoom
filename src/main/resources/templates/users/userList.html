<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('유저 목록')}"></head>
<body>
<div th:replace="~{fragments/bodyHeader :: bodyHeader}"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">유저 목록 (관리자)</h1>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/}">홈</a>
    </div>
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr><th>ID</th><th>닉네임</th><th>이메일</th><th>권한</th><th>포인트</th><th></th></tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.nickName}">nick</td>
                    <td th:text="${u.email}">a@b.com</td>
                    <td th:text="${u.role}">USER</td>
                    <td th:text="${u.points}">500</td>
                    <td class="text-end"><a class="btn btn-outline-dark btn-sm" th:href="@{/users/{id}(id=${u.id})}">상세</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
